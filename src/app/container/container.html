<app-header></app-header>
<app-search (searchChange)="onSearchChange($event)"></app-search>
<app-first-data-loading-page
  [leads]="leads"
  [searchQuery]="searchQuery"
  (leadSelected)="onLeadSelected($event)"
></app-first-data-loading-page>
<div class="popup-overlay" *ngIf="selectedLead">
  <div class="popup-box">
    <button class="close-btn" (click)="closePopup()" close>X</button>
    <app-lead-details-page [lead]="selectedLead"></app-lead-details-page>
  </div>
</div>
