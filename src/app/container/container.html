<app-header></app-header>
<app-search (storethesearchvalue)="updateSearchValue($event)"></app-search>
<app-first-data-loading-page
  [data]="data"
  [searchElementfromTemplate]="searchElementfromTemplate"  #checkhasdata
  (getAllLeadJsonObject)="recieveObject($event)">
</app-first-data-loading-page>
<div class="popup-overlay" *ngIf="selectedLead">
  <div class="popup-box">
    <button class="close-btn" (click)="closePopup()" close>X</button>
    <app-lead-details-page [lead]="selectedLead"></app-lead-details-page>
  </div>
</div>
