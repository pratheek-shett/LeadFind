<nav class="search-panel">
  <form class="form-inline search-form">
    <div class="comb">
      <input
        class="search form-control ms-auto"
        type="search"
        placeholder="Search"
        aria-label="Search"
        #searchInput
        [(ngModel)]="searchTerm"
        name="searchTerm"
      >
      <button type="button" class="btn my-2 my-sm-0" (click)="emitSearchValue()">Search</button>
      <button type="button" (click)="clearSearch()">Clear</button>
    </div>
    <h2 class="search-result">{{ submittedSearchText }}</h2>
  </form>
</nav>
