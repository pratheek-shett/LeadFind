<div class="meal-card">
  <div id="radiobuttondiv">
    <ng-container *ngFor="let value of statusOptions; let i = index">
      <input
        type="radio"
        [id]="'radio-' + i"
        name="lead-status"
        [(ngModel)]="selectedStatus"
        (change)="emitStatusChange()"
        [value]="value"
      >
      <span>{{ value }}</span>
    </ng-container>
  </div>
</div>
